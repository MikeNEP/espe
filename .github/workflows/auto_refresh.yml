name: Refresh M3U8 Tokens

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  refresh-tokens:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        pip install requests

    - name: Ejecutar Extractor de Tokens
      run: python actualizar_lista.py

    - name: Hacer Commit y Push de los cambios
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Auto-Bot"
        git add mundial.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Tokens actualizados en vivo [Bot]" && git push)
